<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract – Sito Sociologico Satirico</title>
    <style>
        /* ── Font declarations ─────────────────────────────────── */
        @font-face { font-family:'PramukhRounded'; font-weight:200; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Extralight.otf') format('opentype'); }
        @font-face { font-family:'PramukhRounded'; font-weight:300; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Light.otf') format('opentype'); }
        @font-face { font-family:'PramukhRounded'; font-weight:350; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Semilight.otf') format('opentype'); }
        @font-face { font-family:'PramukhRounded'; font-weight:400; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Regular.otf') format('opentype'); }
        @font-face { font-family:'PramukhRounded'; font-weight:600; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Semibold.otf') format('opentype'); }
        @font-face { font-family:'PramukhRounded'; font-weight:700; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Bold.otf') format('opentype'); }
        @font-face { font-family:'PramukhRounded'; font-weight:800; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Extrabold.otf') format('opentype'); }
        @font-face { font-family:'PramukhRounded'; font-weight:900; src:url('./fonts/PramukhRounded_Titolazione2/PramukhRounded-Black.otf') format('opentype'); }

        /* ── Reset / base ──────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #B0AFAE;
            overflow-x: hidden;
        }

        /* ── Back button ───────────────────────────────────────── */
        #back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.4rem;
            background: #F467B9;
            color: #fff;
            border-radius: 999px;
            font-family: 'PramukhRounded', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            box-shadow: 0 4px 18px rgba(244,103,185,.4);
            transition: background .2s;
        }
        #back-btn:hover { background: #B34079; }
        #back-btn svg { width: 1.2rem; height: 1.2rem; }

        /* ── Text container ────────────────────────────────────── */
        #text-block {
            width: 100%;
            padding: 0;
            /* Abbassato in modo da partire da sotto il bottone */
            margin-top: 8rem;
            font-family: 'PramukhRounded', sans-serif;
            font-weight: 200;                /* ExtraLight di default */
            font-size: clamp(2rem, 5.2vw, 7rem);
            line-height: 1.18;
            color: #F467B9;
            word-break: keep-all;           /* nessuna sillabazione */
            overflow-wrap: normal;
            hyphens: none;
            -webkit-hyphens: none;
            cursor: default;
        }

        /* ── Singole parole ────────────────────────────────────── */
        .word {
            display: inline-block; /* Permette il transform scale */
            font-family: 'PramukhRounded', sans-serif;
            font-weight: 200;
            transform-origin: center bottom;
            /* Transizione resa molto più veloce (0.3s) per evitare scatti visivi tra i pesi statici del font */
            transition: font-weight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        text-shadow 0.3s ease;
            white-space: normal;
        }

        .word.inflating {
            /* Triplichiamo visivamente il peso e diamo un vero effetto "gonfiato" con scale e ombreggiatura morbida */
            font-weight: 900;               
            transform: scale(1.35) translateY(-5px);
            text-shadow: 0 4px 15px rgba(244, 103, 185, 0.3);
        }

        /* Paragrafo separato da uno spazio verticale */
        .para-break {
            display: block;
            height: 0.8em;
        }
    </style>
</head>
<body>

    <!-- Back to Home -->
    <a id="back-btn" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Torna alla Home
    </a>

    <!-- Testo a bordo-bordo -->
    <div id="text-block" aria-label="Abstract"></div>

    <script>
        const container = document.getElementById('text-block');

        // Testo dell'abstract incorporato direttamente nel codice
        const paragraphs = [
            "Il progetto indaga il paradosso di un’estetica infantile applicata a contenuti adulti, violenti e distopici, come risposta critica al modo in cui il potere si relaziona alle masse. Palloncini, forme basiche, materiali gonfiabili, colori baby e superfici glossy costruiscono una satira della cultura del potere, mettendone in luce l’assurdità, la spettacolarizzazione e l’autoreferenzialità. L’infantilizzazione del linguaggio visivo non ha l’obiettivo di semplificare il messaggio, ma di renderlo più incisivo: abbassare il registro estetico diventa una strategia per colpire il potere attraverso i suoi stessi codici comunicativi, trasformando la derisione in un atto di dissacrazione consapevole."
        ];

        paragraphs.forEach((para, pi) => {
            const words = para.split(/\s+/);
            words.forEach((word, wi) => {
                const span = document.createElement('span');
                span.classList.add('word');
                span.textContent = word;
                container.appendChild(span);

                // spazio tra le parole (tranne dopo l'ultima)
                if (wi < words.length - 1) {
                    container.appendChild(document.createTextNode(' '));
                }
            });

            // Separatore visivo tra i paragrafi
            if (pi < paragraphs.length - 1) {
                const br = document.createElement('span');
                br.classList.add('para-break');
                container.appendChild(br);
                container.appendChild(document.createTextNode(' '));
            }
        });

        // ── Logica hover: gonfia la parola sotto il cursore ──────
        let currentWord = null;
        let deflateTimer = null;

        function inflate(span) {
            if (span === currentWord) return;
            deflate();                       
            currentWord = span;
            span.classList.add('inflating');
        }

        function deflate() {
            if (!currentWord) return;
            currentWord.classList.remove('inflating');
            currentWord = null;
        }

        container.addEventListener('mousemove', (e) => {
            const target = e.target;
            if (target.classList.contains('word')) {
                inflate(target);
                clearTimeout(deflateTimer);
            } else {
                clearTimeout(deflateTimer);
                deflateTimer = setTimeout(deflate, 100);
            }
        });

        container.addEventListener('mouseleave', () => {
            clearTimeout(deflateTimer);
            deflate();
        });
    </script>

</body>
</html>
